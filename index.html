<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spotify Random Album - V1.4</title>
<style>
body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;padding:20px}
button{padding:12px 18px;font-size:16px;cursor:pointer;margin:4px}
input{padding:10px;width:300px}
#status,#artistResult{margin-top:20px;white-space:pre-wrap}
</style>
</head>
<body>
<h1>Spotify Random Album - V1.4</h1>

<button id="loginBtn">Mit Spotify anmelden</button>

<div id="status">Nicht angemeldet</div>

<hr>

<input id="artistInput" placeholder="z.B. Iron Maiden">
<button id="searchBtn">Künstler suchen</button><button id="deviceBtn">📱 Gerät wählen</button><button id="followedBtn">❤️ Gefolgte Künstler</button><button id="surpriseBtn">🎲 Überrasch mich</button>

<div id="deviceSelector" style="display:none;margin-top:16px;padding:12px;border:1px solid #ccc;border-radius:6px;">
  <strong>Abspielgerät wählen:</strong>
  <div id="deviceList" style="margin-top:8px"></div>
</div>
<div id="selectedDevice" style="margin-top:8px;font-size:14px;color:#555"></div>

<div id="artistResult"></div><div id="spotifyLink" style="margin-top:20px"></div><div id="playResult" style="margin-top:20px"></div><div id="deviceResult" style="margin-top:20px"></div><div id="followedResult" style="margin-top:20px;white-space:pre-wrap"></div><div id="surpriseResult" style="margin-top:20px;white-space:pre-wrap"></div>

<script>
const CLIENT_ID = "7f11ab0b763a4d95ba84882b55101ee1";
const REDIRECT_URI = "https://gitarrenteufel.github.io/zufalltify/";
const SCOPES = "user-read-private user-read-playback-state user-modify-playback-state user-follow-read";
let currentAlbumUri = null;

const LIVE_BLACKLIST = [
  "live", "en vivo", "en directo", "unplugged", "acoustic",
  "concert", "tour", "bbc", "archives", "rock in rio",
  "donington", "wembley", "madison square", "budokan",
  "bootleg", "broadcast", "recorded live", "live at",
  "live in", "live from", "live &", "& live"
];

function isLiveAlbum(name) {
  const lower = name.toLowerCase();
  return LIVE_BLACKLIST.some(term => lower.includes(term));
}

function normalizeAlbumName(name) {
  return name.toLowerCase()
    .replace(/\(.*?\)/g, '')
    .replace(/\[.*?\]/g, '')
    .replace(/\bremaster(ed)?\b/g, '')
    .replace(/\bdeluxe\b/g, '')
    .replace(/\bsuper\b/g, '')
    .replace(/\bexpanded\b/g, '')
    .replace(/\bcollector'?s?\b/g, '')
    .replace(/\bedition\b/g, '')
    .replace(/\banniversary\b/g, '')
    .replace(/\b\d{4}\s*(mix|remaster|version|edition)\b/g, '')
    .replace(/\bmix\b/g, '')
    .replace(/\bversion\b/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function base64url(bytes){
  return btoa(String.fromCharCode(...new Uint8Array(bytes)))
    .replace(/\+/g,'-')
    .replace(/\//g,'_')
    .replace(/=+$/,'');
}

async function sha256(text){
  return await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(text)
  );
}

async function login(){
  const verifier = [...crypto.getRandomValues(new Uint8Array(64))]
    .map(b => b.toString(16).padStart(2,"0"))
    .join("");

  localStorage.setItem("pkce_verifier", verifier);

  const challenge = base64url(await sha256(verifier));

  const url = new URL("https://accounts.spotify.com/authorize");
  url.searchParams.set("client_id", CLIENT_ID);
  url.searchParams.set("response_type", "code");
  url.searchParams.set("redirect_uri", REDIRECT_URI);
  url.searchParams.set("scope", SCOPES);
  url.searchParams.set("code_challenge_method", "S256");
  url.searchParams.set("code_challenge", challenge);

  location.href = url.toString();
}

async function exchangeCode(code){
  const verifier = localStorage.getItem("pkce_verifier");

  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: "authorization_code",
    code: code,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier
  });

  const response = await fetch(
    "https://accounts.spotify.com/api/token",
    {
      method: "POST",
      headers: {"Content-Type":"application/x-www-form-urlencoded"},
      body
    }
  );

  return await response.json();
}

function checkTokenExpiry() {
  const expiresAt = localStorage.getItem("spotify_token_expires_at");
  if (!expiresAt) return;
  const remaining = parseInt(expiresAt) - Date.now();
  const status = document.getElementById("status");
  if (remaining < 0) {
    status.textContent = "⚠️ Session abgelaufen – bitte erneut anmelden.";
    status.style.color = "red";
  } else if (remaining < 5 * 60 * 1000) {
    const min = Math.ceil(remaining / 60000);
    status.textContent = `⚠️ Session läuft in ${min} Minute(n) ab – bitte erneut anmelden.`;
    status.style.color = "orange";
  }
}

async function loadProfile(token){
  const response = await fetch(
    "https://api.spotify.com/v1/me",
    {headers:{Authorization:"Bearer " + token}}
  );
  return await response.json();
}

async function loadAlbums(){
  const token = localStorage.getItem("spotify_access_token");
  const artist = document.getElementById("artistInput").value.trim();

  const searchResponse = await fetch(
    "https://api.spotify.com/v1/search?q=" +
    encodeURIComponent("artist:" + artist) +
    "&type=artist&limit=1&market=DE",
    { headers:{ Authorization:"Bearer " + token } }
  );

  const searchData = await searchResponse.json();
  const found = searchData?.artists?.items?.[0];

  if(!found){
    document.getElementById("artistResult").textContent =
      "Kein Künstler gefunden.";
    return;
  }

  // Album-Paginierung: alle Seiten laden
  let allAlbums = [];
  let albumsUrl = "https://api.spotify.com/v1/artists/" +
    found.id + "/albums?include_groups=album&market=DE&limit=50";

  while(albumsUrl){
    const albumsResponse = await fetch(albumsUrl,
      { headers:{ Authorization:"Bearer " + token } }
    );
    const albumsData = await albumsResponse.json();
    allAlbums.push(...(albumsData.items || []));
    albumsUrl = albumsData.next || null;
  }

const seen = new Set();
const studioAlbums = (allAlbums || []).filter(album => {
  if (isLiveAlbum(album.name)) return false;
  const key = normalizeAlbumName(album.name);
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

if (studioAlbums.length === 0) {
  document.getElementById("artistResult").textContent =
    "Künstler gefunden:\n" + found.name +
    "\n\nKeine Studioalben gefunden.";
  return;
}

const albumNames = studioAlbums
  .map((album, index) =>
    (index + 1) + ". " + album.name
  )
  .join("\n");

const randomAlbum =
  studioAlbums[Math.floor(Math.random() * studioAlbums.length)];
currentAlbumUri = randomAlbum.uri;

document.getElementById("artistResult").textContent =
  "Künstler gefunden:\n" +
  found.name +
  "\n\nSpotify-ID:\n" +
  found.id +
"\n\nStudioalben gefunden:\n" +
studioAlbums.length +
"\n\n🎲 Zufallsalbum:\n" +
randomAlbum.name +
"\n\nAlbumliste:\n\n" +
albumNames;

document.getElementById("spotifyLink").innerHTML =
  '<p><a href="' + randomAlbum.external_urls.spotify +
  '" target="_blank">🔗 In Spotify öffnen</a></p>';

document.getElementById("playResult").innerHTML =
  '<button id="playBtn">▶️ Album abspielen</button>';

document.getElementById("playBtn").addEventListener("click", playAlbum);
}




async function playAlbum(){
  const token = localStorage.getItem("spotify_access_token");
  if(!currentAlbumUri) return;

  const deviceId = localStorage.getItem("spotify_device_id");

  const body = { context_uri: currentAlbumUri };
  let url = "https://api.spotify.com/v1/me/player/play";
  if(deviceId){ url += "?device_id=" + encodeURIComponent(deviceId); }

  const response = await fetch(url, {
    method:"PUT",
    headers:{
      "Authorization":"Bearer " + token,
      "Content-Type":"application/json"
    },
    body: JSON.stringify(body)
  });

  if(response.ok || response.status===204){
    alert("Album wird gestartet.");
  } else {
    const txt = await response.text();
    alert("Fehler: " + txt);
  }
}


async function showDeviceSelector(){
  const token = localStorage.getItem("spotify_access_token");

  const response = await fetch(
    "https://api.spotify.com/v1/me/player/devices",
    { headers:{ Authorization:"Bearer " + token } }
  );

  const data = await response.json();
  const devices = data.devices || [];

  if(devices.length === 0){
    alert("Keine Spotify-Geräte gefunden.\nBitte Spotify auf einem Gerät öffnen und erneut versuchen.");
    return;
  }

  const list = document.getElementById("deviceList");
  list.innerHTML = "";

  devices.forEach(d => {
    const btn = document.createElement("button");
    btn.style.display = "block";
    btn.style.margin = "4px 0";
    btn.style.width = "100%";
    btn.style.textAlign = "left";
    btn.textContent = d.name + " (" + d.type + ")";
    btn.addEventListener("click", () => {
      localStorage.setItem("spotify_device_id", d.id);
      localStorage.setItem("spotify_device_name", d.name);
      document.getElementById("selectedDevice").textContent =
        "📱 Gerät: " + d.name;
      document.getElementById("deviceSelector").style.display = "none";
    });
    list.appendChild(btn);
  });

  document.getElementById("deviceSelector").style.display = "block";
}

async function showFollowedArtists(){
  const token = localStorage.getItem("spotify_access_token");

  let allArtists = [];
  let after = null;

  while(true){
    let url = "https://api.spotify.com/v1/me/following?type=artist&limit=50";
    if(after){ url += "&after=" + encodeURIComponent(after); }

    const response = await fetch(url, {
      headers:{ Authorization:"Bearer " + token }
    });
    const data = await response.json();
    const artists = data?.artists?.items || [];
    allArtists.push(...artists);

    if(!data?.artists?.cursors?.after){ break; }
    after = data.artists.cursors.after;
  }

  document.getElementById("followedResult").textContent =
    "Gefolgte Künstler (" + allArtists.length + "):\n\n" +
    allArtists.map(a => a.name).join("\n");
}



async function surpriseMe(){

  const token = localStorage.getItem("spotify_access_token");

  let allArtists = [];
  let after = null;

  while(true){
    let url = "https://api.spotify.com/v1/me/following?type=artist&limit=50";

    if(after){
      url += "&after=" + encodeURIComponent(after);
    }

    const response = await fetch(url,{
      headers:{ Authorization:"Bearer " + token }
    });

    const data = await response.json();
    const artists = data?.artists?.items || [];

    allArtists.push(...artists);

    if(!data?.artists?.cursors?.after){
      break;
    }

    after = data.artists.cursors.after;
  }

  for(let attempt=0; attempt<30; attempt++){

    const artist = allArtists[Math.floor(Math.random() * allArtists.length)];

    // Album-Paginierung auch in surpriseMe
    let allAlbumsSurprise = [];
    let albumsUrlS = "https://api.spotify.com/v1/artists/" + artist.id +
      "/albums?include_groups=album&market=DE&limit=50";

    while(albumsUrlS){
      const albumsResponse = await fetch(albumsUrlS,
        { headers:{ Authorization:"Bearer " + token } }
      );
      const albumsData = await albumsResponse.json();
      allAlbumsSurprise.push(...(albumsData.items || []));
      albumsUrlS = albumsData.next || null;
    }

    const seen2 = new Set();
    const studioAlbums = (allAlbumsSurprise || []).filter(album => {
      if (isLiveAlbum(album.name)) return false;
      const key = normalizeAlbumName(album.name);
      if (seen2.has(key)) return false;
      seen2.add(key);
      return true;
    });

    if(studioAlbums.length === 0) continue;

    const randomAlbum =
      studioAlbums[Math.floor(Math.random() * studioAlbums.length)];

    currentAlbumUri = randomAlbum.uri;

    document.getElementById("surpriseResult").textContent =
      "🎲 Überrasch mich\n\nKünstler:\n" + artist.name +
      "\n\nAlbum:\n" + randomAlbum.name;

    try { await playAlbum(); } catch(e) {}
    return;
  }

  document.getElementById("surpriseResult").textContent =
    "Kein passendes Album gefunden.";
}




document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("searchBtn").addEventListener("click", loadAlbums);
document.getElementById("deviceBtn").addEventListener("click", showDeviceSelector);
document.getElementById("followedBtn").addEventListener("click", showFollowedArtists);
document.getElementById("surpriseBtn").addEventListener("click", surpriseMe);

document.getElementById("artistInput").addEventListener("keydown", e => {
  if(e.key === "Enter") loadAlbums();
});

(async () => {
  const status = document.getElementById("status");
  const params = new URLSearchParams(location.search);
  const code = params.get("code");

  try {
    if(code){
      status.textContent = "Tausche Code gegen Token...";

      const tokenData = await exchangeCode(code);

      if(tokenData.error){
        status.textContent = "Token-Fehler: " + JSON.stringify(tokenData);
        return;
      }

      localStorage.setItem(
        "spotify_access_token",
        tokenData.access_token
      );

      // Token-Ablaufzeit speichern (Spotify: 3600 Sekunden)
      const expiresAt = Date.now() + (tokenData.expires_in || 3600) * 1000;
      localStorage.setItem("spotify_token_expires_at", expiresAt);

      const profile = await loadProfile(tokenData.access_token);

      status.textContent =
        "Angemeldet als: " +
        (profile.display_name || profile.id);

      history.replaceState({}, "", "/");
    }
  } catch(err){
    status.textContent = "Fehler: " + err.message;
  }

  // Gespeichertes Gerät anzeigen
  const savedDevice = localStorage.getItem("spotify_device_name");
  if(savedDevice){
    document.getElementById("selectedDevice").textContent =
      "📱 Gerät: " + savedDevice;
  }

  // Immer beim Seitenstart: Token-Ablauf sofort + alle 60s prüfen
  checkTokenExpiry();
  setInterval(checkTokenExpiry, 60000);
})();
</script>
</body>
</html>
